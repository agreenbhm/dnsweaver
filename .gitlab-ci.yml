# dnsweaver - GitLab CI/CD Pipeline
# Streamlined from go-project-template

stages: [validate, test, security, build, pages, docker, deploy, integration, github-release]

variables:
  GOPROXY: https://proxy.golang.org,direct
  GOFLAGS: "-mod=readonly"
  BINARY_NAME: "dnsweaver"
  REGISTRY: "registry.probablyfine.dev"
  IMAGE: "registry.probablyfine.dev/root/dnsweaver"
  # Deploy target - set these as CI/CD variables or override here
  # DEPLOY_HOST: "swarm-manager.example.com"
  # DEPLOY_USER: "deploy"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop)$/ || $CI_COMMIT_BRANCH =~ /^(feature|bugfix|hotfix|fix)\//
    - if: $CI_COMMIT_TAG

# Rule templates
.rules-code-changes: &rules-code-changes
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    changes: &code-files ["{**/*.go,go.mod,go.sum}"]
  - if: $CI_COMMIT_BRANCH =~ /^(feature|bugfix|hotfix)\//
    changes: *code-files
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes: *code-files

# Docker builds: main, develop, tags, AND feature branches
# Feature branch images are tagged as feature-<slug> for easy identification/cleanup
.rules-docker: &rules-docker
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    changes: &docker-files ["{**/*.go,go.mod,go.sum,Dockerfile,.dockerignore}"]
  - if: $CI_COMMIT_BRANCH =~ /^(feature|bugfix|hotfix|fix)\//
    changes: *docker-files

.go-base:
  image: golang:1.25.11-alpine
  before_script:
    - apk add --no-cache git
    - go mod download

# ─────────────────────────────────────────────────────────────────────────────
# Validate
# ─────────────────────────────────────────────────────────────────────────────

validate:branch-name:
  stage: validate
  image: alpine:3.21
  script:
    - |
      [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "develop" ] && exit 0
      [ -n "$CI_COMMIT_TAG" ] && exit 0
      echo "$CI_COMMIT_REF_NAME" | grep -qE "^(feature|bugfix|hotfix)/[0-9]+-" && echo "✅ $CI_COMMIT_REF_NAME" || echo "⚠️ Non-standard: $CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG
  allow_failure: true

validate:commit-message:
  stage: validate
  image: alpine:3.21
  script:
    - |
      MSG=$(echo "$CI_COMMIT_MESSAGE" | head -1)
      echo "$MSG" | grep -qE "^Merge " && exit 0
      echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?: " && echo "✅ $MSG" || echo "⚠️ $MSG"
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG
  allow_failure: true

# ─────────────────────────────────────────────────────────────────────────────
# Test & Security
# ─────────────────────────────────────────────────────────────────────────────

lint:
  extends: .go-base
  stage: test
  script:
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    - golangci-lint run --config .golangci.yml --timeout 5m
  rules: *rules-code-changes
  allow_failure: true

test:go:
  extends: .go-base
  stage: test
  script:
    - go test -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report: { coverage_format: cobertura, path: coverage.out }
  rules: *rules-code-changes

security:trivy:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    # Block on CRITICAL/HIGH Go dependency vulnerabilities
    - trivy fs --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --ignorefile .trivyignore --format table .
    # Warn on MEDIUM/LOW (track, don't block)
    - trivy fs --exit-code 0 --severity MEDIUM,LOW --ignorefile .trivyignore --format table .
  rules: *rules-code-changes
  allow_failure: false

security:govulncheck:
  extends: .go-base
  stage: security
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    # govulncheck has no ignore/suppression mechanism (unlike trivy's .trivyignore).
    # Wrapper: pass if ONLY known-unfixed vulns are found; fail on any new ones.
    # Known unfixed (docker/docker v28.5.2 — no fix for github.com/docker/docker module):
    #   GO-2026-4887 - Moby AuthZ plugin bypass (oversized request bodies)
    #   GO-2026-4883 - Moby off-by-one plugin privilege validation
    #   GO-2026-5617 - Moby docker cp arbitrary empty files via symlink swap
    #   GO-2026-5668 - Moby docker cp bind mount redirection to host path
    #   GO-2026-5746 - Moby PUT /containers/{id}/archive host binary execution
    # Risk: Low — DNSweaver uses client SDK only (container/swarm listing, events).
    # These are Docker daemon vulns; not exploitable via client library imports.
    # Fix exists only in moby/moby/v2 (beta). Review when v2 reaches stable.
    - |
      KNOWN_VULNS="GO-2026-4887|GO-2026-4883|GO-2026-5617|GO-2026-5668|GO-2026-5746"
      RC=0
      govulncheck ./... > govulncheck.txt 2>&1 || RC=$?
      cat govulncheck.txt
      if [ "$RC" -eq 0 ]; then
        echo "✅ No vulnerabilities found"
        exit 0
      fi
      FOUND=$(grep -oE 'GO-[0-9]+-[0-9]+' govulncheck.txt | sort -u)
      UNKNOWN=$(echo "$FOUND" | grep -vE "^($KNOWN_VULNS)$" || true)
      if [ -n "$UNKNOWN" ]; then
        echo "❌ NEW vulnerabilities found: $UNKNOWN"
        exit 1
      fi
      echo "⚠️  Only known-unfixed vulnerabilities found (docker/docker SDK, no upstream fix):"
      echo "$FOUND"
      echo "Review by: 2026-07-01 or when moby/moby/v2 reaches stable release"
  rules: *rules-code-changes
  allow_failure: false

security:gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    # Fetch centralized config from homelab-iac (private repo)
    - |
      apk add --no-cache curl
      curl -sSf --header "PRIVATE-TOKEN: ${IAC_READ_TOKEN}" \
        "${CI_SERVER_URL}/api/v4/projects/3/repository/files/security%2Fgitleaks.toml/raw?ref=main" \
        -o .gitleaks.toml
    - gitleaks detect --source . --config .gitleaks.toml --verbose --no-git
  rules: *rules-code-changes
  allow_failure: false  # Block on secrets detection

# Container image vulnerability scan (runs after Docker build)
# Must be in docker stage — needs: can't reference jobs from later stages
# $TAG/$EXTRA are injected automatically from docker:build:amd64's dotenv artifact
security:container-scan:
  stage: docker
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs:
    - job: docker:build:amd64
      artifacts: true
  variables:
    TRIVY_USERNAME: "$CI_REGISTRY_USER"
    TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
  script:
    - echo "Scanning $IMAGE:$TAG-amd64"
    # Block on CRITICAL/HIGH (must fix before release)
    - trivy image --exit-code 1 --severity CRITICAL,HIGH
        --ignore-unfixed
        --ignorefile .trivyignore
        --format table
        "$IMAGE:$TAG-amd64"
    # Warn on MEDIUM/LOW (track, don't block)
    - trivy image --exit-code 0 --severity MEDIUM,LOW
        --ignorefile .trivyignore
        --format table
        "$IMAGE:$TAG-amd64"
  rules: *rules-docker
  allow_failure: false

# ─────────────────────────────────────────────────────────────────────────────
# Build
# ─────────────────────────────────────────────────────────────────────────────

build:go:
  extends: .go-base
  stage: build
  script:
    - apk add --no-cache ca-certificates tzdata
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o $BINARY_NAME ./cmd/dnsweaver
  artifacts:
    paths: [$BINARY_NAME]
    expire_in: 1 day
  rules: *rules-code-changes

# ─────────────────────────────────────────────────────────────────────────────
# Pages (Documentation Preview)
# ─────────────────────────────────────────────────────────────────────────────

.pages-base:
  stage: pages
  image: python:3.12-alpine
  before_script:
    - apk add --no-cache git cairo-dev libffi-dev build-base
    - pip install mkdocs-material mkdocs-git-revision-date-localized-plugin pillow cairosvg

# Feature branch doc preview - accessible at $CI_PAGES_URL/-/jobs/$CI_JOB_ID/artifacts/public/
pages:preview:
  extends: .pages-base
  script:
    - mkdocs build --site-dir public
  artifacts:
    paths: [public]
    expire_in: 7 days
  environment:
    name: docs/preview/$CI_COMMIT_REF_SLUG
    url: $CI_JOB_URL/artifacts/public/index.html
    auto_stop_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(feature|bugfix|hotfix|fix)\//
      changes: ["{docs/**/*,mkdocs.yml,README.md}"]
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: ["{docs/**/*,mkdocs.yml,README.md}"]

# Main GitLab Pages deployment (develop/main only)
pages:
  extends: .pages-base
  script:
    - mkdocs build --site-dir public
  artifacts:
    paths: [public]
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"
      changes: ["{docs/**/*,mkdocs.yml,README.md}"]

# ─────────────────────────────────────────────────────────────────────────────
# Docker (multi-arch)
# ─────────────────────────────────────────────────────────────────────────────

.docker-base:
  stage: docker
  image: docker:cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $REGISTRY
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then TAG="$CI_COMMIT_TAG"; EXTRA="latest"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then TAG="edge"; EXTRA=""
      elif [ "$CI_COMMIT_BRANCH" = "develop" ]; then TAG="dev"; EXTRA=""
      else
        # Feature/bugfix/hotfix branches: use sanitized branch name as tag
        # feature/132-rfc2136-provider -> feature-132-rfc2136-provider
        TAG=$(echo "$CI_COMMIT_BRANCH" | sed 's|/|-|g')
        EXTRA=""
      fi
      echo "TAG=$TAG" > build.env && echo "EXTRA=$EXTRA" >> build.env
  rules: *rules-docker

docker:build:amd64:
  extends: .docker-base
  script:
    - source build.env
    - docker build --pull --platform linux/amd64 --build-arg VERSION=$CI_COMMIT_SHORT_SHA --build-arg CACHE_BUST=$CI_PIPELINE_ID -t $IMAGE:$TAG-amd64 -t $IMAGE:sha-$CI_COMMIT_SHORT_SHA-amd64 .
    - docker push $IMAGE:$TAG-amd64 && docker push $IMAGE:sha-$CI_COMMIT_SHORT_SHA-amd64
  artifacts:
    reports: { dotenv: build.env }
  tags: [docker]

docker:build:arm64:
  extends: .docker-base
  script:
    - source build.env
    - docker build --pull --platform linux/arm64 --build-arg VERSION=$CI_COMMIT_SHORT_SHA --build-arg CACHE_BUST=$CI_PIPELINE_ID -t $IMAGE:$TAG-arm64 -t $IMAGE:sha-$CI_COMMIT_SHORT_SHA-arm64 .
    - docker push $IMAGE:$TAG-arm64 && docker push $IMAGE:sha-$CI_COMMIT_SHORT_SHA-arm64
  tags: [arm64]

docker:manifest:
  extends: .docker-base
  needs: [docker:build:amd64, docker:build:arm64]
  script:
    - source build.env
    - docker buildx create --name mb --use 2>/dev/null || docker buildx use mb
    - docker buildx imagetools create -t $IMAGE:$TAG $IMAGE:$TAG-amd64 $IMAGE:$TAG-arm64
    - docker buildx imagetools create -t $IMAGE:sha-$CI_COMMIT_SHORT_SHA $IMAGE:sha-$CI_COMMIT_SHORT_SHA-amd64 $IMAGE:sha-$CI_COMMIT_SHORT_SHA-arm64
    - '[ -n "$EXTRA" ] && docker buildx imagetools create -t $IMAGE:$EXTRA $IMAGE:$TAG-amd64 $IMAGE:$TAG-arm64 || true'
  tags: [docker]

# ─────────────────────────────────────────────────────────────────────────────
# Deploy
# ─────────────────────────────────────────────────────────────────────────────

.deploy-base:
  stage: deploy
  image: alpine:3.21
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519 || true
    - '[ -n "$DEPLOY_HOST" ] && ssh-keyscan -p 22 $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true'

deploy:dev:
  extends: .deploy-base
  environment: { name: development }
  script:
    - |
      [ -z "$SSH_PRIVATE_KEY" ] && echo "SSH_PRIVATE_KEY not set" && exit 0
      [ -z "$DEPLOY_HOST" ] && echo "DEPLOY_HOST not set" && exit 0
      ssh -o StrictHostKeyChecking=no ${DEPLOY_USER:-deploy}@$DEPLOY_HOST \
        "docker service update --force --image $IMAGE:dev dnsweaver_dnsweaver" || echo "Service not deployed"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes: *docker-files
      when: manual
  allow_failure: true

deploy:production:
  extends: .deploy-base
  environment: { name: production }
  script:
    - |
      [ -z "$SSH_PRIVATE_KEY" ] && echo "SSH_PRIVATE_KEY not set" && exit 0
      [ -z "$DEPLOY_HOST" ] && echo "DEPLOY_HOST not set" && exit 0
      [ -n "$CI_COMMIT_TAG" ] && IMG="$IMAGE:$CI_COMMIT_TAG" || IMG="$IMAGE:edge"
      ssh -o StrictHostKeyChecking=no ${DEPLOY_USER:-deploy}@$DEPLOY_HOST \
        "docker service update --force --image $IMG dnsweaver_dnsweaver" || echo "Service not deployed"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *docker-files
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual
  allow_failure: true

# ─────────────────────────────────────────────────────────────────────────────
# Integration Tests (post-deploy validation)
# ─────────────────────────────────────────────────────────────────────────────

integration:smoke:
  stage: integration
  image: alpine:3.21
  needs:
    - job: deploy:dev
      optional: true
  before_script:
    - apk add --no-cache bash curl python3
  script:
    - |
      # Verify required variables
      [ -z "$SWARM_VIP" ] && echo "SWARM_VIP not configured" && exit 0
      [ -z "$TECHNITIUM_HOST" ] && echo "TECHNITIUM_HOST not configured" && exit 0
      [ -z "$TECHNITIUM_TOKEN" ] && echo "TECHNITIUM_TOKEN not configured" && exit 0
      [ -z "$TEST_ZONE" ] && echo "TEST_ZONE not configured" && exit 0

      # Run smoke tests
      chmod +x scripts/integration-test.sh
      bash scripts/integration-test.sh --smoke
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
  allow_failure: true

# ─────────────────────────────────────────────────────────────────────────────
# GitHub Release (tags only)
# ─────────────────────────────────────────────────────────────────────────────

.github-docker:
  stage: github-release
  image: docker:cli
  before_script:
    - echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_USERNAME" --password-stdin
    - echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/

github:build:amd64:
  extends: .github-docker
  script:
    - |
      GHCR="ghcr.io/$GITHUB_REPO"
      DH="docker.io/$DOCKERHUB_USERNAME/dnsweaver"
      docker build --pull --platform linux/amd64 --build-arg VERSION=$CI_COMMIT_TAG --build-arg CACHE_BUST=$CI_PIPELINE_ID \
        --label org.opencontainers.image.source=https://github.com/$GITHUB_REPO \
        -t $GHCR:$CI_COMMIT_TAG-amd64 -t $DH:$CI_COMMIT_TAG-amd64 .
      docker push $GHCR:$CI_COMMIT_TAG-amd64 && docker push $DH:$CI_COMMIT_TAG-amd64
  tags: [docker]

github:build:arm64:
  extends: .github-docker
  script:
    - |
      GHCR="ghcr.io/$GITHUB_REPO"
      DH="docker.io/$DOCKERHUB_USERNAME/dnsweaver"
      docker build --pull --platform linux/arm64 --build-arg VERSION=$CI_COMMIT_TAG --build-arg CACHE_BUST=$CI_PIPELINE_ID \
        --label org.opencontainers.image.source=https://github.com/$GITHUB_REPO \
        -t $GHCR:$CI_COMMIT_TAG-arm64 -t $DH:$CI_COMMIT_TAG-arm64 .
      docker push $GHCR:$CI_COMMIT_TAG-arm64 && docker push $DH:$CI_COMMIT_TAG-arm64
  tags: [arm64]

github:release:
  stage: github-release
  image: alpine:3.21
  needs: [github:build:amd64, github:build:arm64]
  before_script:
    - apk add --no-cache curl jq docker-cli
    - echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_USERNAME" --password-stdin
    - echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - |
      TAG="$CI_COMMIT_TAG"
      GHCR="ghcr.io/$GITHUB_REPO"
      DH="docker.io/$DOCKERHUB_USERNAME/dnsweaver"

      # Create manifests
      for R in "$GHCR" "$DH"; do
        docker manifest create $R:$TAG $R:$TAG-amd64 $R:$TAG-arm64 && docker manifest push $R:$TAG
        docker manifest create $R:latest $R:$TAG-amd64 $R:$TAG-arm64 && docker manifest push $R:latest
      done

      # Extract changelog
      VER=$(echo "$TAG" | sed 's/^v//')
      NOTES=$(awk "BEGIN{p=0} /^## \\[$VER\\]/{p=1; next} p && /^## \\[/{p=0} p" CHANGELOG.md 2>/dev/null || echo "See CHANGELOG.md")

      # Create GitHub release
      BODY=$(printf '%s\n\n## Docker Images\n```bash\ndocker pull %s:%s\ndocker pull %s:%s\n```' "$NOTES" "$GHCR" "$TAG" "$DH" "$TAG")
      curl -sX POST "https://api.github.com/repos/$GITHUB_REPO/releases" \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Content-Type: application/json" \
        -d "$(jq -n --arg tag "$TAG" --arg name "$TAG" --arg body "$BODY" '{tag_name:$tag,name:$name,body:$body,draft:false,prerelease:false}')"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/
  tags: [docker]

# Sync the Docker Hub repository "Overview" (full_description) from docker/DOCKERHUB.md.
# Runs on release tags and whenever the description file changes on the default branch.
# Reuses the existing $DOCKERHUB_USERNAME / $DOCKERHUB_TOKEN CI variables.
github:dockerhub-description:
  stage: github-release
  image: alpine:3.21
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      JWT=$(curl -s -H "Content-Type: application/json" -X POST \
        -d "$(jq -n --arg u "$DOCKERHUB_USERNAME" --arg p "$DOCKERHUB_TOKEN" '{username:$u,password:$p}')" \
        https://hub.docker.com/v2/users/login/ | jq -r .token)
      if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then echo "Docker Hub login failed"; exit 1; fi
      CODE=$(curl -s -o /tmp/resp.json -w '%{http_code}' -X PATCH \
        -H "Authorization: JWT $JWT" -H "Content-Type: application/json" \
        --data "$(jq -n --rawfile d docker/DOCKERHUB.md '{full_description:$d}')" \
        "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/dnsweaver/")
      echo "Docker Hub PATCH HTTP $CODE"
      [ "$CODE" = "200" ] || { cat /tmp/resp.json; exit 1; }
      echo "Synced full_description ($(wc -c < docker/DOCKERHUB.md) bytes)"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: ["docker/DOCKERHUB.md"]
  tags: [docker]

