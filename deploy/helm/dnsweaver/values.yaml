# Default values for dnsweaver Helm chart.

# -- Number of replicas. Use 1 unless you have multi-instance coordination.
replicaCount: 1

image:
  # -- Container image repository
  repository: maxamill/dnsweaver
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default: Chart appVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the release name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- ServiceAccount name (auto-generated if empty)
  name: ""

rbac:
  # -- Create ClusterRole and ClusterRoleBinding
  create: true
  # -- Watch Ingress resources (networking.k8s.io/v1)
  watchIngress: true
  # -- Watch IngressRoute CRDs (traefik.io/v1alpha1)
  watchIngressRoute: true
  # -- Watch HTTPRoute CRDs (gateway.networking.k8s.io/v1)
  watchHTTPRoute: true
  # -- Watch Service resources (v1)
  watchServices: false

# -- Pod annotations
podAnnotations: {}

# -- Pod labels (in addition to chart labels)
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# -- Deployment strategy
strategy:
  type: Recreate

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5

# -- Node selector for scheduling
nodeSelector: {}

# -- Tolerations for scheduling
tolerations: []

# -- Affinity rules for scheduling
affinity: {}

# -- Additional environment variables (array of name/value or valueFrom)
extraEnv: []
# - name: DNSWEAVER_INTERNAL_TOKEN
#   valueFrom:
#     secretKeyRef:
#       name: dnsweaver-credentials
#       key: token

# -- Additional volume mounts
extraVolumeMounts: []

# -- Additional volumes
extraVolumes: []

serviceMonitor:
  # -- Create a Prometheus ServiceMonitor
  enabled: false
  # -- ServiceMonitor scrape interval
  interval: 60s
  # -- Additional labels for the ServiceMonitor
  labels: {}

podDisruptionBudget:
  # -- Create a PodDisruptionBudget
  enabled: false
  # -- Minimum available pods
  minAvailable: 1

# dnsweaver application configuration
config:
  # -- Platform mode: docker, kubernetes, or both
  platform: kubernetes

  logging:
    # -- Log level: debug, info, warn, error
    level: info
    # -- Log format: json or text
    format: json

  reconciler:
    # -- Reconciliation interval (Go duration)
    interval: 60s
    # -- Dry-run mode (log changes without applying)
    dryRun: false
    # -- Remove DNS records for deleted resources
    cleanupOrphans: true
    # -- Track record ownership via TXT records
    ownershipTracking: true

  kubernetes:
    # -- Kubeconfig path (empty = in-cluster)
    kubeconfig: ""
    # -- Namespace filter (empty = all namespaces)
    namespaces: ""
    # -- Watch Ingress resources
    watchIngress: true
    # -- Watch IngressRoute CRDs
    watchIngressRoute: true
    # -- Watch HTTPRoute CRDs
    watchHTTPRoute: true
    # -- Watch Service resources (opt-in)
    watchServices: false
    # -- Label selector for filtering
    labelSelector: ""
    # -- Annotation filter (key=value)
    annotationFilter: ""

  server:
    # -- Health/metrics port
    port: 8080

  # -- Hostname sources (order matters: first match wins)
  sources:
    - name: dnsweaver
    - name: kubernetes

  # -- DNS provider configuration
  # Credentials should be injected via extraEnv from Secrets.
  providers: []
  # Example:
  #   - name: internal
  #     type: technitium
  #     domains:
  #       - "*.internal.example.com"
  #     record_type: A
  #     target: 10.0.0.100
  #     ttl: 300
  #     config:
  #       url: http://dns.example.com:5380
  #       zone: internal.example.com

# -- Existing ConfigMap name (overrides config section above)
existingConfigMap: ""

# -- Existing Secret name for provider credentials
existingSecret: ""
